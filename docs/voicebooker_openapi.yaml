openapi: "3.1.0"
info:
  title: Gestronomy VoiceBooker Webhook Receiver
  version: "1.0.0"
  description: API for receiving incoming voice bot booking events from VoiceBooker.de
paths:
  /webhooks/voicebooker:
    post:
      summary: Receive events from VoiceBooker
      description: Webhook endpoint validating HMAC-SHA256 signatures and creating reservations idempotently.
      parameters:
        - in: header
          name: X-VB-Signature
          schema:
            type: string
          required: true
          description: HMAC-SHA256 signature of the request body
        - in: header
          name: X-VB-Timestamp
          schema:
            type: string
            format: date-time
          required: true
          description: ISO8601 timestamp of delivery
        - in: header
          name: X-VB-Event-Id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique event ID for deduplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceBookerEvent'
      responses:
        '200':
          description: Accepted and queued for background processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
        '401':
          description: Unauthorized - Invalid signature or expired timestamp
components:
  schemas:
    VoiceBookerEvent:
      type: object
      required: ["event_id","event_type","timestamp","payload"]
      properties:
        event_id: 
          type: string
          format: uuid
        event_type: 
          type: string
          example: "booking.created"
        timestamp: 
          type: string
          format: date-time
        payload: 
          type: object
          description: Business payload varying by event_type
          properties:
            booking_id:
              type: string
            customer:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
            restaurant_id:
              type: string
            party_size:
              type: integer
            datetime:
              type: string
              format: date-time
            source:
              type: string
            notes:
              type: string
    WebhookResponse:
      type: object
      required: ["status", "event_id"]
      properties:
        status:
          type: string
          example: "accepted"
        event_id:
          type: string
          format: uuid
