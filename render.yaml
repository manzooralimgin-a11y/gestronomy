# Render Blueprint — Gestronomy
# https://render.com/docs/blueprint-spec

databases:
  - name: gestronomy-db
    plan: free
    databaseName: gestronomy
    user: gestronomy
    ipAllowList: []  # allow all (managed by Render)

services:
  # --- Backend API ---
  - type: web
    name: gestronomy-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestronomy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://gestronomy-web.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false  # user sets manually
      - key: CELERY_BROKER_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString

  # --- Frontend ---
  - type: web
    name: gestronomy-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api.onrender.com

  # --- Redis ---
  - type: redis
    name: gestronomy-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
