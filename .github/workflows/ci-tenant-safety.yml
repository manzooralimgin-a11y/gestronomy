name: Tenant Safety CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tenant-isolation-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gestronomy
          POSTGRES_PASSWORD: gestronomy
          POSTGRES_DB: gestronomy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gestronomy -d gestronomy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gestronomy:gestronomy@localhost:5432/gestronomy_ci
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      APP_ENV: test
      DEBUG: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Cross-tenant isolation suite
        run: pytest -q tests/test_tenant_isolation_api.py
