name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri Windows App
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://gestronomy-api.onrender.com
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Gestronomy-Windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri Mac App
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://gestronomy-api.onrender.com
        run: npm run tauri build

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: Gestronomy-Mac
          path: frontend/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
